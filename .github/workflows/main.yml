name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Create google-services.json
        working-directory: app
        run: |
          cat > google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"scholaros-placeholder","storage_bucket":"scholaros-placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.scholaros.erp"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyPlaceholderKeyForBuildOnly00000000000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScholarOS-ERP-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
